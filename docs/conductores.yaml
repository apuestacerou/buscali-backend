# actualizar este archivo con la información del conductor.
openapi: 3.0.0
info:
  title: Servicio de Conductores
  description: API para gestionar conductores en el sistema de gestión integral.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
paths:
  /conductores:
    get:
      summary: Obtener todos los conductores
      responses:
        '200':
          description: Lista de conductores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conductor'
    post:
      summary: Crear un nuevo conductor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Conductor'
      responses:
        '201':
          description: Conductor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
  /conductores/{cedula}:
    get:
      summary: Obtener un conductor por cedula
      parameters:
        - name: cedula
          in: path
          required: true
          description: cedula del conductor
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Conductor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
        '404':
          description: Conductor no encontrado
    put:
      summary: Actualizar un conductor
      parameters:
        - name: cedula
          in: path
          required: true
          description: cedula del conductor
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Conductor'
      responses:
        '200':
          description: Conductor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
        '404':
          description: Conductor no encontrado
    delete:
      summary: Eliminar un conductor
      parameters:
        - name: cedula
          in: path
          required: true
          description: cedula del conductor
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Conductor eliminado
        '404':
          description: Conductor no encontrado
components:
  schemas:
    Conductor:
      type: object
      properties:
        cedula:
          type: integer
          format: int64
        nombre:
          type: string
        correo_electronico:
          type: string
          format: correo_electronico
        telefono:
          type: integer
          format: int64
        contrasena:
          type: string
        estado:
          type: string
          enum:
            - activo
            - inactivo
        fecha_creacion:
          type: string
          format: date-time

      required:
        - cedula
        - nombre
        - correo_electronico
        - telefono
        - contrasena
        - estado
