openapi: 3.0.0
info:
  title: BusCali Apis
  description: API para gestionar conductores y rutas en el sistema BusCali
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
tags:
  - name: Conductores
    description: Operaciones sobre conductores
  - name: Rutas
    description: Operaciones sobre rutas

components:
  schemas:
    # --- SCHEMAS DE CONDUCTORES ---
    ConductorCreate:
      type: object
      properties:
        cedula:
          type: string
          description: Solo números, máximo 20 dígitos
        nombre:
          type: string
          description: Solo letras y espacios
        correo_electronico:
          type: string
          format: email
        telefono:
          type: string
          description: Entre 7 y 15 dígitos, puede incluir prefijo internacional
        contrasena:
          type: string
          description: Opcional. Debe tener entre 8 y 50 caracteres, incluir mayúscula, minúscula, número y símbolo
        estado:
          type: string
          enum: ['Activo', 'Inactivo']
      required:
        - cedula
        - nombre
        - correo_electronico
        - telefono

    ConductorUpdate:
      type: object
      properties:
        nombre:
          type: string
        correo_electronico:
          type: string
          format: email
        telefono:
          type: string
        contrasena:
          type: string
        estado:
          type: string
          enum: ['Activo', 'Inactivo']

    ConductorResponse:
      type: object
      properties:
        cedula:
          type: string
        nombre:
          type: string
        correo_electronico:
          type: string
        telefono:
          type: string
        estado:
          type: string
          nullable: true
          enum: ['Activo', 'Inactivo']

    # --- SCHEMAS DE RUTAS ---
    RutaCreate:
      type: object
      properties:
        nombre_ruta:
          type: string
        destino:
          type: string
        descripcion:
          type: string
        nombre_empresa:
          type: string
        id_empresa:
          type: string
        coordenadas:
          type: array
          items:
            type: object
            properties:
              lat:
                type: number
              lng:
                type: number
        colorhex:
          type: string
        estado:
          type: string
          enum: ['Activa', 'Inactiva']
      required:
        - nombre_ruta
        - destino
        - nombre_empresa
        - coordenadas

    RutaUpdate:
      type: object
      properties:
        nombre_ruta:
          type: string
        destino:
          type: string
        descripcion:
          type: string
        nombre_empresa:
          type: string
        id_empresa:
          type: string
        coordenadas:
          type: array
          items:
            type: object
            properties:
              lat:
                type: number
              lng:
                type: number
        colorhex:
          type: string
        estado:
          type: string
          enum: ['Activa', 'Inactiva']

    RutaResponse:
      type: object
      properties:
        nombre:
          type: string
        destino:
          type: string
        descripcion:
          type: string
        nombre_empresa:
          type: string
        coordenadas:
          type: object
          properties:
            type:
              type: string
            coordinates:
              type: array
              items:
                type: array
                items:
                  type: number
        colorhex:
          type: string
        estado:
          type: string

    # --- SCHEMAS COMUNES ---
    ErrorResponse:
      type: object
      properties:
        error:
          type: array
          items:
            type: string

paths:
  # --- ENDPOINTS CONDUCTORES ---
  /conductores:
    get:
      tags:
        - Conductores
      summary: Obtener todos los conductores
      responses:
        '200':
          description: Lista de conductores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConductorResponse'
              examples:
                ejemploLista:
                  value:
                    - cedula: '123456789'
                      nombre: 'Juan Pérez'
                      correo_electronico: 'juan.perez@example.com'
                      telefono: '+573001234567'
                      estado: 'Activo'
                    - cedula: '987654321'
                      nombre: 'María Gómez'
                      correo_electronico: 'maria.gomez@example.com'
                      telefono: '+573009876543'
                      estado: 'Inactivo'
        '400':
          description: No se encontraron conductores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemploError:
                  value:
                    error: ['Conductores no encontrados']
    post:
      tags:
        - Conductores
      summary: Crear un nuevo conductor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConductorCreate'
            examples:
              ejemploValido:
                value:
                  cedula: '123456789'
                  nombre: 'Juan Pérez'
                  correo_electronico: 'juan.perez@example.com'
                  telefono: '+573001234567'
                  contrasena: 'Password@123'
                  estado: 'Activo'
      responses:
        '201':
          description: Conductor creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConductorResponse'
              examples:
                ejemploRespuesta:
                  value:
                    cedula: '123456789'
                    nombre: 'Juan Pérez'
                    correo_electronico: 'juan.perez@example.com'
                    telefono: '+573001234567'
                    estado: 'Activo'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemploErrorValidacion:
                  value:
                    error:
                      - 'Formato de correo electrónico inválido'
                      - 'Telefono debe contener solo Números y entre 7 y 15 dígitos'
        '409':
          description: Conflicto por datos duplicados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemploErrorConflicto:
                  value:
                    error:
                      - 'Conductor con esta cedula ya existe'
                      - 'Conductor con este correo electronico ya existe'

  /conductores/{cedula}:
    get:
      tags:
        - Conductores
      summary: Obtener un conductor por cédula
      parameters:
        - name: cedula
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conductor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConductorResponse'
              examples:
                ejemploConductor:
                  value:
                    cedula: '123456789'
                    nombre: 'Juan Pérez'
                    correo_electronico: 'juan.perez@example.com'
                    telefono: '+573001234567'
                    estado: 'Activo'
        '404':
          description: Conductor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemploError404:
                  value:
                    error: ['Conductor no encontrado']
    put:
      tags:
        - Conductores
      summary: Actualizar un conductor
      parameters:
        - name: cedula
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConductorUpdate'
            examples:
              ejemploUpdate:
                value:
                  nombre: 'Juan Pérez Actualizado'
                  telefono: '+573001111111'
                  estado: 'Inactivo'
      responses:
        '200':
          description: Conductor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConductorResponse'
              examples:
                ejemploRespuestaUpdate:
                  value:
                    cedula: '123456789'
                    nombre: 'Juan Pérez Actualizado'
                    correo_electronico: 'juan.perez@example.com'
                    telefono: '+573001111111'
                    estado: 'Inactivo'
        '404':
          description: Conductor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Conductores
      summary: Eliminar un conductor
      parameters:
        - name: cedula
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Conductor eliminado exitosamente
        '404':
          description: Conductor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemploErrorDelete:
                  value:
                    error: ['Conductor no encontrado']

  # --- ENDPOINTS RUTAS ---
  /rutas:
    get:
      tags:
        - Rutas
      summary: Obtener todas las rutas
      responses:
        '200':
          description: Lista de rutas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RutaResponse'
        '400':
          description: No se encontraron rutas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Rutas
      summary: Crear una nueva ruta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RutaCreate'
      responses:
        '201':
          description: Ruta creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaResponse'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rutas/{nombre_ruta}:
    get:
      tags:
        - Rutas
      summary: Obtener una ruta por nombre
      parameters:
        - name: nombre_ruta
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ruta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaResponse'
        '404':
          description: Ruta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Rutas
      summary: Actualizar una ruta por nombre
      parameters:
        - name: nombre_ruta
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RutaUpdate'
      responses:
        '200':
          description: Ruta actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaResponse'
        '404':
          description: Ruta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rutas/destino/{destino}:
    get:
      tags:
        - Rutas
      summary: Obtener una ruta por destino
      parameters:
        - name: destino
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ruta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaResponse'
        '404':
          description: Ruta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rutas/empresa/{nombre_empresa}:
    get:
      tags:
        - Rutas
      summary: Obtener una ruta por empresa
      parameters:
        - name: nombre_empresa
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ruta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RutaResponse'
        '404':
          description: Ruta no encontrada para esta empresa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
